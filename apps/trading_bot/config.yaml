mode: demo
poll_seconds: 30
candles_lookback: 200
resolution: MINUTE_5

risk:
  per_trade_pct: 0.02
  max_concurrent_positions: 1
  daily_drawdown_kill_pct: 0.10
  max_consecutive_losses: 3

strategy:
  ema_fast: 9
  ema_mid: 21
  ema_slow: 50
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  stop_atr_mult: 1.5
  take_profit_atr_mult: 3.0
  breakeven_at_atr_mult: 1.0
  require_macd_above_zero_for_long: true

session:
  trade_only_during_overlap: true
  overlap_utc_start: "12:00"
  overlap_utc_end: "16:00"

markets:
  - epic: EURUSD
    pip_size: 0.0001
  - epic: GBPUSD
    pip_size: 0.0001
